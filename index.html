    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'KaiTi', 'SimSun', 'Microsoft YaHei', Arial, sans-serif;
            background-color: #FFCC00; /* 喜庆金色背景 */
            color: #B22222;            /* 暗红色文字 */
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white; /* 修复红色背景问题 */
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #B22222; /* 暗红色标题 */
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #8B4513;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .search-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
        }

        input {
            padding: 16px 18px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #B22222;
            box-shadow: 0 0 0 4px rgba(178, 34, 34, 0.1);
        }

        input::placeholder {
            color: #bbb;
        }

        button {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #B22222; /* 暗红色按钮 */
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(178, 34, 34, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(178, 34, 34, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            font-size: 18px;
            border-radius: 12px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease-out;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .result-success {
            background-color: #f8f5e6; /* 浅金色成功背景 */
            color: #B22222;
            border: 2px solid #B22222;
        }

        .result-error {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }

        .emoji {
            font-size: 28px;
            margin-right: 10px;
        }

        .result-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .seat-info {
            font-size: 20px;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 28px;
            }

            input, button {
                font-size: 16px;
                padding: 14px 16px;
            }

            #result {
                font-size: 16px;
                min-height: 50px;
            }
        }
    </style>
</head>

        function findSeat() {
            // 修复：增加容错性，去除首尾空格
            const name = document.getElementById("nameInput").value.trim();
            const resultDiv = document.getElementById("result");
            
            // 修复：使用严格匹配，同时处理空输入
            if (!name) {
                resultDiv.innerHTML = `
                    <div class="result-content">
                        <span class="emoji">⚠️</span>
                        <span>請輸入姓名後查詢</span>
                    </div>
                `;
                resultDiv.classList.remove("result-success", "hidden");
                resultDiv.classList.add("result-error");
                return;
            }

            // 查找匹配的记录
            const person = seatData.find(p => p.name === name);

            if (person) {
                resultDiv.innerHTML = `
                    <div class="result-content">
                        <span class="emoji">✅</span>
                        <span class="seat-info">${person.name} 您好！<br>您的座位是：${person.table}，座位號 ${person.seat} 號</span>
                    </div>
                `;
                resultDiv.classList.remove("result-error");
                resultDiv.classList.add("result-success");
            } else {
                resultDiv.innerHTML = `
                    <div class="result-content">
                        <span class="emoji">❌</span>
                        <span>未找到「${name}」的座位信息，請檢查姓名是否正確</span>
                    </div>
                `;
                resultDiv.classList.remove("result-success");
                resultDiv.classList.add("result-error");
            }
            resultDiv.classList.remove("hidden");
        }

        // 按 Enter 鍵查詢
        document.getElementById("nameInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                findSeat();
            }
        });

        // 頁面載入時自動聚焦輸入框
        window.addEventListener("load", function() {
            document.getElementById("nameInput").focus();
        });
