<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查詢座位
    </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: red;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .search-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
        }

        input {
            padding: 16px 18px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #bbb;
        }

        button {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            font-size: 18px;
            border-radius: 12px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease-out;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .result-success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .result-error {
            background-color: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }

        .emoji {
            font-size: 28px;
            margin-right: 10px;
        }

        .result-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .seat-info {
            font-size: 20px;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 28px;
            }

            input, button {
                font-size: 16px;
                padding: 14px 16px;
            }

            #result {
                font-size: 16px;
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>宏武太極學會 丙午年春茗</h1>
        <h1>🎫 查詢座位</h1>
        <div class="subtitle">輸入您的姓名查詢座位資訊</div>
        
        <div class="search-group">
            <input 
                type="text" 
                id="nameInput" 
                placeholder="請輸入你的姓名"
                autocomplete="off"
            >
            <button onclick="findSeat()">查詢座位</button>
        </div>
        
        <div id="result" class="hidden"></div>
    </div>

    <script>
        // 座位数据
        const seatData = [
            { name: "劉國華", seat: 1, table: 1 },
            { name: "唐月琴", seat: 2, table: 1 },
            { name: "梁敏儀", seat: 3, table: 1 },
            { name: "謝麗群", seat: 4, table: 1 },
            { name: "周健", seat: 5, table: 1 },
            { name: "陳志仁", seat: 6, table: 1 },
            { name: "羅麗晶", seat: 7, table: 1 },
            { name: "李潤群", seat: 8, table: 1 },
            { name: "胡永成", seat: 9, table: 1 },
            { name: "盧文法", seat: 10, table: 1 },
            { name: "黎玉蓮", seat: 11, table: 1 },
            { name: "盧文柏", seat: 12, table: 1 },
            { name: "梁麗萍", seat: 1, table: 2 },
            { name: "高裕宣", seat: 2, table: 2 },
            { name: "黑志宏", seat: 3, table: 2 },
            { name: "侯惠芳", seat: 4, table: 2 },
            { name: "朱德明", seat: 5, table: 2 },
            { name: "范素賢", seat: 6, table: 2 },
            { name: "張翠英", seat: 7, table: 2 },
            { name: "梁文惠", seat: 8, table: 2 },
            { name: "張惠蘭", seat: 9, table: 2 },
            { name: "梁翠冰", seat: 10, table: 2 },
            { name: "梁振英", seat: 11, table: 2 },
            { name: "李加超", seat: 12
             , table: 2 },
            { name: "Rocky", seat: 1, table: 3 }
        ];

        function findSeat() {
            const name = document.getElementById("nameInput").value.trim();
            const resultDiv = document.getElementById("result");
            const person = seatData.find(p => p.name === name);

            if (person) {
                resultDiv.innerHTML = `
                    <div class="result-content">
                        <span class="emoji">✅</span>
                        <span class="seat-info">第 ${person.table} 席，座位號 ${person.seat} 號</span>
                    </div>
                `;
                resultDiv.classList.remove("result-error");
                resultDiv.classList.add("result-success");
            } else {
                resultDiv.innerHTML = `
                    <div class="result-content">
                        <span class="emoji">❌</span>
                        <span>未找到您的名字，請重新輸入</span>
                    </div>
                `;
                resultDiv.classList.remove("result-success");
                resultDiv.classList.add("result-error");
            }
            resultDiv.classList.remove("hidden");
        }

        // 按 Enter 鍵查詢
        document.getElementById("nameInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                findSeat();
            }
        });

        // 頁面載入時自動聚焦輸入框
        window.addEventListener("load", function() {
            document.getElementById("nameInput").focus();
        });
    </script>
</body>
</html>
 <title>宏武丙午年春茗</title>

        body {
            background-color: #FFCC00; /* Festive gold color */
            color: #B22222;      /* Dark red for text */

            background-image: url('path-to-festive-background-image'); /* Add a background image */
            background-repeat: no-repeat;
            background-size: cover;
            padding: 20px;
        }
    </style>
</head>
</html>
